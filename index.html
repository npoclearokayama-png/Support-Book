<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>サポートブック</title>

  <link rel="stylesheet" href="assets/styles.css" />

</head>

<body>

<header>
  <div>
    <div class="hdr-title">サポートブック作成</div>
  </div>
  <div class="hdr-right">
    <button class="btn primary" id="btnPrintPdf">出力</button>
    <button class="btn" id="btnExport">保存</button>
    <button class="btn" id="btnImport">読込</button>
    <button class="btn" id="btnReset">リセット</button>
  </div>
</header>

<main>
  <div class="tabs-container">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- タブ内ページ送り -->
  <div class="pager" id="pager" aria-label="tab page navigation">
    <div class="lr">
      <button class="btn" id="btnPrevSub">◀</button>
      <button class="btn" id="btnNextSub">▶</button>
    </div>
    <div class="info" id="pageInfo">1/1</div>
    <div style="width:84px;"></div>
  </div>

  <div class="stage" id="stage"></div>
</main>

<div id="progress">
  <div id="p-text">PDF作成中...</div>
  <div id="p-sub"></div>
  <div class="p-wrap"><div id="p-bar"></div></div>
</div>

<div class="modal" id="modal">
  <div class="m-content" id="m-content"></div>
</div>

<div id="exportHost"></div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script type="module" src="assets/app.js"></script>

</body>
</html>
