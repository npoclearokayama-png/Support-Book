<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>サポートブック</title>

  <link rel="stylesheet" href="assets/styles.css" />

</head>

<body>

<header>
  <div>
    <div class="hdr-title">サポートブック作成</div>
  </div>
  <div class="hdr-right">
    <button class="btn primary" id="btnPrintPdf" aria-label="PDFまたは印刷で出力">PDF/印刷</button>
    <button class="btn" id="btnExport" aria-label="入力データをJSONで保存">データ保存</button>
    <button class="btn" id="btnImport" aria-label="保存したJSONデータを読み込む">データ読込</button>
    <button class="btn" id="btnUndo" aria-label="ひとつ前の状態に戻す" disabled>元に戻す</button>
    <button class="btn" id="btnReset" aria-label="入力内容を全てリセット">全消去</button>
  </div>
</header>

<main>
  <div class="tabs-container">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- タブ内ページ送り -->
  <div class="pager" id="pager" aria-label="tab page navigation">
    <div class="lr">
      <button class="btn" id="btnPrevSub" aria-label="前のページへ">◀ 前へ</button>
      <button class="btn" id="btnNextSub" aria-label="次のページへ">次へ ▶</button>
    </div>
    <div class="info" id="pageInfo">1/1</div>
    <div style="width:84px;"></div>
  </div>

  <div class="stage" id="stage"></div>
</main>

<div id="progress">
  <div id="p-text">PDF作成中...</div>
  <div id="p-sub"></div>
  <div class="p-wrap"><div id="p-bar"></div></div>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="m-content" id="m-content"></div>
</div>

<div id="exportHost"></div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script type="module" src="assets/app.js"></script>

</body>
</html>
